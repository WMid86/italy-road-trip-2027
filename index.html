<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#173d34">
  <meta name="description" content="La Strada 2027 — a private collaborative planner for a family road trip through central and southern Italy.">
  <meta name="color-scheme" content="light">
  <title>La Strada 2027</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://tile.openstreetmap.org">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="v2-styles.css">
</head>
<body>
  <section id="gate" class="gate" aria-label="Private trip access">
    <img class="gate-art" src="assets/hero-roadtrip.svg" alt="A vintage car overlooking Italian hills with wine, cheese and olives">
    <div class="gate-overlay"></div>
    <div class="gate-card">
      <div class="gate-brand"><span>LS</span><p>LA STRADA<br><small>ITALY · JULY 2027</small></p></div>
      <p class="kicker light">Rome to Matera and back</p>
      <h1>One road.<br>Five beautiful bases.</h1>
      <p class="gate-copy">A private place for W, N and L to compare, vote and shape the trip together.</p>
      <form id="pinForm" class="pin-form" autocomplete="off">
        <label class="sr-only" for="pinInput">Four-digit trip PIN</label>
        <input id="pinInput" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="••••" aria-describedby="pinMessage">
        <button type="submit">Enter trip</button>
      </form>
      <p id="pinMessage" class="gate-message" role="status"></p>
    </div>
  </section>

  <section id="profileGate" class="profile-gate is-hidden" aria-label="Choose traveller">
    <div class="profile-shell">
      <p class="kicker light">Welcome to La Strada</p>
      <h2>Who is planning?</h2>
      <p>Your choice is remembered on this device.</p>
      <div class="profile-grid">
        <button class="profile-card admin" data-profile="W"><span>W</span><strong>Administrator</strong><small>Can confirm group choices</small></button>
        <button class="profile-card" data-profile="N"><span>N</span><strong>Traveller</strong><small>Equal vote</small></button>
        <button class="profile-card" data-profile="L"><span>L</span><strong>Traveller</strong><small>Equal vote</small></button>
      </div>
    </div>
  </section>

  <div id="app" class="app is-hidden">
    <header class="topbar">
      <button class="brand-button" data-view="trip" aria-label="Open trip board">
        <span class="brand-mark">LS</span>
        <span><strong>La Strada</strong><small>Italy · July 2027</small></span>
      </button>
      <nav class="desktop-nav" aria-label="Main navigation">
        <button data-view="trip">Trip board</button>
        <button data-view="stays">Compare stays</button>
        <button data-view="explore">Explore</button>
        <button data-view="decisions">Decisions</button>
        <button data-view="budget">Budget</button>
      </nav>
      <button id="profileButton" class="profile-button" aria-label="Switch traveller">
        <span id="profileInitial">W</span>
        <span><strong id="profileRole">Administrator</strong><small>Switch</small></span>
      </button>
    </header>

    <main id="viewRoot" tabindex="-1"></main>

    <nav class="mobile-nav" aria-label="Mobile navigation">
      <button data-view="trip"><span>⌂</span>Trip</button>
      <button data-view="stays"><span>▤</span>Stays</button>
      <button data-view="explore"><span>◉</span>Explore</button>
      <button data-view="decisions"><span>✓</span>Vote</button>
      <button data-view="budget"><span>€</span>Budget</button>
    </nav>
  </div>

  <dialog id="detailSheet" class="detail-sheet">
    <button id="closeSheet" class="sheet-close" aria-label="Close">×</button>
    <div id="sheetContent"></div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="v2-app.js"></script>
</body>
</html>
