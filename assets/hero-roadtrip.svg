<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Italian road trip at sunset</title>
  <desc id="desc">A vintage car overlooking Italian hills, with wine, cheese and olives prepared for a picnic.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#203449"/>
      <stop offset="0.46" stop-color="#d77b57"/>
      <stop offset="1" stop-color="#f5d5a7"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3bf"/>
      <stop offset="1" stop-color="#efad56"/>
    </linearGradient>
    <linearGradient id="hillsBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8c8e67"/>
      <stop offset="1" stop-color="#566347"/>
    </linearGradient>
    <linearGradient id="hillsFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#485b3f"/>
      <stop offset="1" stop-color="#26392f"/>
    </linearGradient>
    <linearGradient id="carPaint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b54532"/>
      <stop offset="0.55" stop-color="#7d241f"/>
      <stop offset="1" stop-color="#491412"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b89a73"/>
      <stop offset="1" stop-color="#5d554b"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

